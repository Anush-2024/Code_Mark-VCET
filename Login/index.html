<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Authentication with OTP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container { 
      background: #fff; 
      width: 420px; 
      border-radius: 16px; 
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25); 
      padding: 40px;
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h2 { color: #1a1a2e; margin-bottom: 8px; text-align: center; font-size: 24px; }
    .subtitle { color: #888; font-size: 14px; text-align: center; margin-bottom: 28px; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; color: #444; font-weight: 500; margin-bottom: 8px; font-size: 14px; }
    
    .phone-input-wrapper { display: flex; gap: 8px; }
    .country-code {
      width: 80px;
      padding: 12px 8px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      background: #fafafa;
      transition: border-color 0.3s;
    }
    .country-code:focus { border-color: #667eea; outline: none; }
    
    input[type="text"], input[type="tel"] { 
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      transition: border-color 0.3s, box-shadow 0.3s;
      background: #fafafa;
    }
    input:focus { 
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
      background: #fff;
    }
    
    button { 
      width: 100%; 
      padding: 14px; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; 
      border: none; 
      border-radius: 10px; 
      margin-top: 20px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { 
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    button:active { transform: translateY(0); }
    button:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
    
    .hidden { display: none !important; }
    
    .message { 
      padding: 14px; margin-top: 15px; border-radius: 10px;
      text-align: center; font-size: 13px; font-weight: 500;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .message.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    
    .otp-input-group { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
    .otp-input-group input {
      width: 50px; height: 55px; text-align: center;
      font-size: 22px; font-weight: 700; padding: 0; border-radius: 10px; background: #fafafa;
    }
    
    .timer { text-align: center; color: #667eea; font-size: 13px; margin-top: 10px; font-weight: 500; }
    .timer.expired { color: #dc3545; }
    
    .resend-link { text-align: center; margin-top: 15px; }
    .resend-link a { color: #667eea; text-decoration: none; cursor: pointer; font-size: 13px; font-weight: 500; }
    .resend-link a:hover { text-decoration: underline; }
    .resend-link a.disabled { color: #ccc; cursor: not-allowed; text-decoration: none; }

    .back-link { text-align: center; margin-top: 15px; }
    .back-link a { color: #667eea; text-decoration: none; cursor: pointer; font-size: 13px; font-weight: 500; }
    .back-link a:hover { text-decoration: underline; }

    .icon-large { font-size: 48px; text-align: center; margin-bottom: 16px; }

    .loading-spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #fff; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; transition: background 0.3s; }
    .step-dot.active { background: #667eea; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Step 1: Phone Number Entry -->
    <div id="phoneStep">
      <div class="step-indicator">
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
      </div>
      <div class="icon-large">📱</div>
      <h2>Sign In</h2>
      <p class="subtitle">Enter your phone number to continue</p>
      <form id="phoneForm">
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <div class="phone-input-wrapper">
            <select class="country-code" id="countryCode">
              <option value="+1">🇺🇸 +1</option>
              <option value="+44">🇬🇧 +44</option>
              <option value="+91" selected>🇮🇳 +91</option>
              <option value="+86">🇨🇳 +86</option>
              <option value="+81">🇯🇵 +81</option>
              <option value="+33">🇫🇷 +33</option>
              <option value="+49">🇩🇪 +49</option>
            </select>
            <input type="tel" id="phone" placeholder="10-digit number" required>
          </div>
        </div>
        <button type="submit" id="sendBtn">Send OTP</button>
      </form>
      <div id="phoneMessage"></div>
    </div>

    <!-- Step 2: OTP Verification -->
    <div id="otpStep" class="hidden">
      <div class="step-indicator">
        <div class="step-dot active"></div>
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
      </div>
      <div class="icon-large">🔐</div>
      <h2>Verify OTP</h2>
      <p class="subtitle" id="phoneDisplay"></p>
      <form id="otpForm">
        <div class="form-group">
          <label>Enter the 6-digit code sent to your phone</label>
          <div class="otp-input-group">
            <input type="text" class="otp-digit" maxlength="1" required>
            <input type="text" class="otp-digit" maxlength="1" required>
            <input type="text" class="otp-digit" maxlength="1" required>
            <input type="text" class="otp-digit" maxlength="1" required>
            <input type="text" class="otp-digit" maxlength="1" required>
            <input type="text" class="otp-digit" maxlength="1" required>
          </div>
        </div>
        <div class="timer" id="timer">Resend OTP in <span id="seconds">60</span>s</div>
        <button type="submit">Verify OTP</button>
      </form>
      <div id="otpMessage"></div>
      <div class="resend-link">
        <a id="resendLink" class="disabled" onclick="resendOTP()">Resend OTP</a>
      </div>
      <div class="back-link">
        <a onclick="goBackToPhone()">← Change number</a>
      </div>
    </div>

    <!-- Step 3: Success -->
    <div id="successStep" class="hidden">
      <div class="step-indicator">
        <div class="step-dot active"></div>
        <div class="step-dot active"></div>
        <div class="step-dot active"></div>
      </div>
      <div class="icon-large">🎉</div>
      <h2>Welcome!</h2>
      <div class="message success" style="font-size: 15px;">
        ✓ You have been successfully authenticated!
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:5000/api';
    let timerInterval;
    let timeLeft = 60;
    let storedPhone = '';

    // OTP digit auto-focus & digit-only input
    document.querySelectorAll('.otp-digit').forEach((input, index) => {
      input.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
        if (e.target.value.length === 1 && index < 5) {
          document.querySelectorAll('.otp-digit')[index + 1].focus();
        }
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && index > 0 && e.target.value === '') {
          document.querySelectorAll('.otp-digit')[index - 1].focus();
        }
      });
    });

    function goBackToPhone() {
      document.getElementById('otpStep').classList.add('hidden');
      document.getElementById('phoneStep').classList.remove('hidden');
      clearInterval(timerInterval);
    }

    // Step 1: Send OTP
    document.getElementById('phoneForm').onsubmit = async function(e) {
      e.preventDefault();
      const phone = document.getElementById('phone').value;
      const countryCode = document.getElementById('countryCode').value;
      const fullPhone = countryCode + phone;
      const phoneMsg = document.getElementById('phoneMessage');
      const sendBtn = document.getElementById('sendBtn');

      if (phone.length < 10) {
        phoneMsg.className = 'message error';
        phoneMsg.textContent = '❌ Please enter a valid phone number';
        return;
      }

      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="loading-spinner"></span>Sending OTP...';
      phoneMsg.className = 'message info';
      phoneMsg.textContent = '📱 Sending OTP to ' + fullPhone + '...';
      storedPhone = fullPhone;

      try {
        const response = await fetch(`${API}/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phoneNumber: fullPhone })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Failed to send OTP');

        phoneMsg.className = 'message success';
        phoneMsg.textContent = '✓ OTP sent successfully!';

        setTimeout(() => {
          document.getElementById('phoneStep').classList.add('hidden');
          document.getElementById('otpStep').classList.remove('hidden');
          document.getElementById('phoneDisplay').textContent = 'Code sent to ' + fullPhone;
          startTimer();
          document.querySelectorAll('.otp-digit')[0].focus();
        }, 800);

      } catch (error) {
        phoneMsg.className = 'message error';
        phoneMsg.textContent = '❌ ' + error.message;
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send OTP';
      }
    };

    // Step 2: Verify OTP
    document.getElementById('otpForm').onsubmit = async function(e) {
      e.preventDefault();
      const otpInputs = document.querySelectorAll('.otp-digit');
      const enteredOTP = Array.from(otpInputs).map(i => i.value).join('');
      const otpMsg = document.getElementById('otpMessage');
      const verifyBtn = document.querySelector('#otpForm button');

      if (enteredOTP.length !== 6) {
        otpMsg.className = 'message error';
        otpMsg.textContent = '❌ Please enter all 6 digits';
        return;
      }

      verifyBtn.disabled = true;
      verifyBtn.innerHTML = '<span class="loading-spinner"></span>Verifying...';
      otpMsg.className = 'message info';
      otpMsg.textContent = '🔄 Verifying OTP...';

      try {
        const response = await fetch(`${API}/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phoneNumber: storedPhone, otp: enteredOTP })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Invalid OTP');

        if (data.sessionToken) localStorage.setItem('authToken', data.sessionToken);

        otpMsg.className = 'message success';
        otpMsg.textContent = '✓ OTP verified successfully!';
        clearInterval(timerInterval);

        setTimeout(() => {
          document.getElementById('otpStep').classList.add('hidden');
          document.getElementById('successStep').classList.remove('hidden');
        }, 1200);

      } catch (error) {
        otpMsg.className = 'message error';
        otpMsg.textContent = '❌ ' + error.message;
        otpInputs.forEach(i => i.value = '');
        otpInputs[0].focus();
      } finally {
        verifyBtn.disabled = false;
        verifyBtn.textContent = 'Verify OTP';
      }
    };

    function startTimer() {
      timeLeft = 60;
      document.getElementById('timer').classList.remove('expired');
      document.getElementById('resendLink').classList.add('disabled');
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('seconds').textContent = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          document.getElementById('timer').classList.add('expired');
          document.getElementById('timer').textContent = 'OTP Expired';
          document.getElementById('resendLink').classList.remove('disabled');
        }
      }, 1000);
    }

    async function resendOTP() {
      if (timeLeft > 0) return;
      const otpMsg = document.getElementById('otpMessage');
      const resendLink = document.getElementById('resendLink');
      resendLink.classList.add('disabled');
      otpMsg.className = 'message info';
      otpMsg.textContent = '📱 Resending OTP...';

      try {
        const response = await fetch(`${API}/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phoneNumber: storedPhone })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Failed to resend OTP');

        otpMsg.className = 'message success';
        otpMsg.textContent = '✓ OTP resent successfully!';
        document.querySelectorAll('.otp-digit').forEach(i => i.value = '');
        document.getElementById('timer').classList.remove('expired');
        startTimer();
      } catch (error) {
        otpMsg.className = 'message error';
        otpMsg.textContent = '❌ ' + error.message;
        resendLink.classList.remove('disabled');
      }
    }
  </script>
</body>
</html>
